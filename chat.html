<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1B2A4A;
  --navy-light: #2A3D66;
  --gold: #C4A265;
  --gold-light: #D4B87A;
  --white: #FFFFFF;
  --gray-50: #F9FAFB;
  --gray-100: #F5F5F5;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-400: #9CA3AF;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-700: #374151;
  --gray-800: #1F2937;
  --teal: #2A7B88;
  --teal-dark: #1F6570;
  --teal-light: #E0F2F4;
  --red-soft: #DC4A68;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --shadow-sm: 0 1px 3px rgba(27,42,74,0.08);
  --shadow-md: 0 4px 12px rgba(27,42,74,0.1);
  --shadow-lg: 0 8px 30px rgba(27,42,74,0.15);
  --shadow-xl: 0 16px 48px rgba(27,42,74,0.2);
}

body {
  font-family: var(--font);
  color: var(--gray-800);
  background: var(--gray-50);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
img { max-width: 100%; display: block; }

/* ===== LANDING PAGE ===== */
.landing-header {
  background: var(--navy);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
}

.logo-text {
  color: var(--white);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.02em;
}

.logo-text span {
  color: var(--gold);
  font-weight: 400;
  font-size: 12px;
  display: block;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: -2px;
}

.header-nav {
  display: flex;
  gap: 28px;
  align-items: center;
}

.header-nav a {
  color: rgba(255,255,255,0.75);
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.header-nav a:hover { color: var(--gold); }

/* HERO */
.hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, #354B75 100%);
  padding: 100px 24px 120px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(196,162,101,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -10%;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(42,123,136,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(196,162,101,0.15);
  border: 1px solid rgba(196,162,101,0.3);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--gold-light);
  margin-bottom: 28px;
  letter-spacing: 0.02em;
}

.hero-badge svg { width: 14px; height: 14px; }

.hero h1 {
  color: var(--white);
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 20px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

.hero h1 em {
  font-style: normal;
  color: var(--gold);
}

.hero p {
  color: rgba(255,255,255,0.7);
  font-size: clamp(16px, 2vw, 19px);
  max-width: 540px;
  margin: 0 auto 36px;
  line-height: 1.65;
}

.hero-ctas {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  background: var(--teal);
  color: var(--white);
  padding: 14px 28px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  transition: background 0.2s, transform 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary:hover { background: var(--teal-dark); transform: translateY(-1px); }

.btn-outline {
  background: transparent;
  color: var(--white);
  padding: 14px 28px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.25);
  transition: border-color 0.2s, background 0.2s;
}

.btn-outline:hover { border-color: var(--gold); background: rgba(196,162,101,0.08); }

/* DEMO NOTICE */
.demo-notice {
  background: var(--teal-light);
  border: 1px solid rgba(42,123,136,0.2);
  padding: 14px 24px;
  text-align: center;
  font-size: 14px;
  color: var(--teal-dark);
  font-weight: 500;
}

.demo-notice strong { color: var(--teal); }

/* PRODUCTS SECTION */
.products-section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 80px 24px;
}

.section-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 8px;
}

.section-title {
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}

.section-desc {
  color: var(--gray-500);
  font-size: 16px;
  max-width: 520px;
  margin-bottom: 40px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
}

.product-card {
  background: var(--white);
  border-radius: var(--radius-md);
  border: 1px solid var(--gray-200);
  padding: 24px;
  transition: box-shadow 0.3s, transform 0.2s;
}

.product-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.product-card-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  color: var(--gold);
  font-size: 18px;
  font-weight: 700;
}

.product-card h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.product-card .price {
  font-size: 14px;
  font-weight: 600;
  color: var(--teal);
  margin-bottom: 8px;
}

.product-card p {
  font-size: 13px;
  color: var(--gray-500);
  line-height: 1.55;
  margin-bottom: 16px;
}

.product-card-cta {
  font-size: 13px;
  font-weight: 600;
  color: var(--teal);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: gap 0.2s;
}

.product-card-cta:hover { gap: 8px; }

/* FEATURES STRIP */
.features-strip {
  background: var(--navy);
  padding: 60px 24px;
}

.features-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 32px;
}

.feature-item {
  text-align: center;
}

.feature-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(196,162,101,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
}

.feature-item h4 {
  color: var(--white);
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
}

.feature-item p {
  color: rgba(255,255,255,0.55);
  font-size: 13px;
  line-height: 1.55;
}

/* FOOTER */
.landing-footer {
  background: var(--gray-100);
  border-top: 1px solid var(--gray-200);
  padding: 32px 24px;
  text-align: center;
}

.landing-footer p {
  font-size: 13px;
  color: var(--gray-400);
  margin-bottom: 6px;
}

.landing-footer a {
  color: var(--gray-400);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.landing-footer a:hover { color: var(--teal); }

/* ===== CHATBOT WIDGET ===== */

/* FLOATING BUTTON */
.chat-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--navy);
  color: var(--gold);
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
  border: 2px solid rgba(196,162,101,0.3);
}

.chat-toggle:hover {
  transform: scale(1.08);
  box-shadow: var(--shadow-xl);
}

.chat-toggle.hidden { display: none; }

.chat-toggle svg {
  width: 28px;
  height: 28px;
  transition: transform 0.3s;
}

/* Pulse animation */
.chat-toggle::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  opacity: 0;
  animation: chatPulse 3s ease-in-out infinite;
}

@keyframes chatPulse {
  0%, 100% { opacity: 0; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.15); }
}

/* Notification badge */
.chat-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--red-soft);
  color: var(--white);
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--white);
}

/* Tooltip */
.chat-tooltip {
  position: absolute;
  bottom: 70px;
  right: 0;
  background: var(--white);
  color: var(--navy);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.2s, transform 0.2s;
}

.chat-toggle:hover .chat-tooltip {
  opacity: 1;
  transform: translateY(0);
}

/* CHAT WINDOW */
.chat-window {
  position: fixed;
  bottom: 96px;
  right: 24px;
  width: 380px;
  height: 520px;
  background: var(--white);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  display: flex;
  flex-direction: column;
  z-index: 1001;
  overflow: hidden;
  transform: scale(0.85) translateY(20px);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
  transform-origin: bottom right;
}

.chat-window.open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: auto;
}

/* CHAT HEADER */
.chat-header {
  background: var(--navy);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.chat-header-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(196,162,101,0.15);
  border: 1.5px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.chat-header-info {
  flex: 1;
  min-width: 0;
}

.chat-header-info h3 {
  color: var(--white);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.chat-header-info p {
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.chat-header-info p::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ADE80;
  display: inline-block;
}

.chat-close {
  color: rgba(255,255,255,0.5);
  padding: 4px;
  border-radius: var(--radius-sm);
  transition: color 0.2s, background 0.2s;
}

.chat-close:hover {
  color: var(--white);
  background: rgba(255,255,255,0.1);
}

.chat-close svg { width: 20px; height: 20px; }

/* CHAT MESSAGES */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
  background: var(--gray-50);
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

/* MESSAGE BUBBLES */
.msg-row {
  display: flex;
  gap: 8px;
  max-width: 92%;
  animation: msgSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  opacity: 0;
}

@keyframes msgSlideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-row.bot { align-self: flex-start; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  color: var(--gold);
  font-size: 12px;
  font-weight: 700;
}

.msg-row.user .msg-avatar {
  background: var(--teal);
  color: var(--white);
}

.msg-bubble {
  padding: 10px 14px;
  font-size: 13.5px;
  line-height: 1.55;
  border-radius: 16px;
}

.msg-row.bot .msg-bubble {
  background: var(--white);
  color: var(--gray-700);
  border: 1px solid var(--gray-200);
  border-bottom-left-radius: 4px;
}

.msg-row.user .msg-bubble {
  background: var(--navy);
  color: var(--white);
  border-bottom-right-radius: 4px;
}

/* TYPING INDICATOR */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  align-items: center;
}

.typing-indicator span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--gray-400);
  animation: typingBounce 1.2s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

@keyframes typingBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-4px); opacity: 1; }
}

/* QUICK REPLY BUTTONS */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 2px 0 8px;
  align-self: flex-start;
  max-width: 92%;
  margin-left: 38px;
  animation: msgSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  opacity: 0;
}

.quick-reply-btn {
  padding: 8px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  background: var(--white);
  color: var(--navy);
  border: 1px solid var(--gray-200);
  transition: all 0.2s;
  line-height: 1.3;
}

.quick-reply-btn:hover {
  background: var(--navy);
  color: var(--white);
  border-color: var(--navy);
}

.quick-reply-btn.cta-btn {
  background: var(--teal);
  color: var(--white);
  border-color: var(--teal);
}

.quick-reply-btn.cta-btn:hover {
  background: var(--teal-dark);
  border-color: var(--teal-dark);
}

/* PRODUCT CARDS IN CHAT */
.chat-product-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 14px;
  margin: 4px 0;
  margin-left: 38px;
  max-width: 280px;
  animation: msgSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  opacity: 0;
  transition: box-shadow 0.2s;
}

.chat-product-card:hover { box-shadow: var(--shadow-sm); }

.chat-product-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
}

.chat-product-name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.3;
}

.chat-product-price {
  font-size: 13px;
  font-weight: 700;
  color: var(--teal);
  white-space: nowrap;
}

.chat-product-desc {
  font-size: 12px;
  color: var(--gray-500);
  line-height: 1.5;
  margin-bottom: 10px;
}

.chat-product-cta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--teal);
  transition: gap 0.2s;
}

.chat-product-cta:hover { gap: 8px; }

/* DISCLAIMER */
.chat-disclaimer {
  font-size: 10.5px;
  color: var(--gray-400);
  padding: 4px 0;
  margin-left: 38px;
  line-height: 1.4;
  max-width: 280px;
  animation: msgSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  opacity: 0;
  font-style: italic;
}

/* CHAT INPUT */
.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--gray-200);
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--white);
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--gray-200);
  border-radius: 100px;
  font-size: 13.5px;
  font-family: var(--font);
  color: var(--gray-800);
  outline: none;
  transition: border-color 0.2s;
  background: var(--gray-50);
}

.chat-input:focus { border-color: var(--teal); }
.chat-input::placeholder { color: var(--gray-400); }

.chat-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.chat-send {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--teal);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.15s;
  flex-shrink: 0;
}

.chat-send:hover { background: var(--teal-dark); transform: scale(1.05); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
.chat-send svg { width: 18px; height: 18px; }

/* CHAT FOOTER */
.chat-footer {
  padding: 8px 16px;
  text-align: center;
  font-size: 10.5px;
  color: var(--gray-400);
  background: var(--white);
  flex-shrink: 0;
  border-top: 1px solid var(--gray-100);
}

.chat-footer a {
  color: var(--gray-400);
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 640px) {
  .header-nav { display: none; }

  .hero { padding: 60px 20px 80px; }

  .hero-ctas { flex-direction: column; align-items: center; }

// ===== CHATBOT ENGINE =====
class ArtemisChatbot {
  constructor() {
    this.messages = document.getElementById('chatMessages');
    this.input = document.getElementById('chatInput');
    this.sendBtn = document.getElementById('chatSend');
    this.window = document.getElementById('chatWindow');
    this.toggleBtn = document.getElementById('chatToggle');
    this.closeBtn = document.getElementById('chatClose');
    this.badge = this.toggleBtn.querySelector('.chat-badge');

    this.state = 'idle'; // state machine
    this.context = {};   // stores user selections
    this.inputMode = null; // null | 'name' | 'email'
    this.userName = '';
    this.userEmail = '';

    this.init();
  }

  init() {
    this.toggleBtn.addEventListener('click', () => this.open());
    this.closeBtn.addEventListener('click', () => this.close());
    this.sendBtn.addEventListener('click', () => this.handleTextInput());
    this.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') this.handleTextInput();
    });
    // Widget does NOT auto-popup — sits quietly in corner
  }

  open() {
    this.window.classList.add('open');
    this.toggleBtn.classList.add('hidden');
    this.badge.style.display = 'none';

    if (this.state === 'idle') {
      this.state = 'welcome';
      setTimeout(() => this.showWelcome(), 400);
    }
  }

  close() {
    this.window.classList.remove('open');
    this.toggleBtn.classList.remove('hidden');
  }

  // ===== MESSAGE RENDERING =====

  addBotMessage(text) {
    return new Promise((resolve) => {
      // Show typing first
      const typing = this.addTypingIndicator();
      this.scrollToBottom();

      const delay = 500 + Math.random() * 400;
      setTimeout(() => {
        typing.remove();
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        row.innerHTML = `
          <div class="msg-avatar">A</div>
          <div class="msg-bubble">${this.formatText(text)}</div>
        `;
        this.messages.appendChild(row);
        this.scrollToBottom();
        resolve();
      }, delay);
    });
  }

  addUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-avatar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
      </div>
      <div class="msg-bubble">${this.escapeHtml(text)}</div>
    `;
    this.messages.appendChild(row);
    this.scrollToBottom();
  }

  addQuickReplies(buttons) {
    return new Promise((resolve) => {
      const container = document.createElement('div');
      container.className = 'quick-replies';

      buttons.forEach(btn => {
        const button = document.createElement('button');
        button.className = 'quick-reply-btn' + (btn.cta ? ' cta-btn' : '');
        button.textContent = btn.label;
        
        if (btn.url) {
          button.addEventListener('click', () => {
            window.open(btn.url, '_blank', 'noopener,noreferrer');
          });
        } else {
          button.addEventListener('click', () => {
            this.disableQuickReplies(container);
            this.addUserMessage(btn.label);
            if (btn.action) btn.action();
          });
        }
        
        container.appendChild(button);
      });

      this.messages.appendChild(container);
      this.scrollToBottom();
      resolve();
    });
  }

  addProductCard(productKey) {
    const p = PRODUCTS[productKey];
    if (!p) return;

    const card = document.createElement('div');
    card.className = 'chat-product-card';
    card.innerHTML = `
      <div class="chat-product-header">
        <span class="chat-product-name">${p.name}</span>
        <span class="chat-product-price">${p.price}</span>
      </div>
      <div class="chat-product-desc">${p.desc}</div>
      <a href="${SHOP_URL}" target="_blank" rel="noopener noreferrer" class="chat-product-cta">
        View Product \u2192
      </a>
    `;
    this.messages.appendChild(card);
    this.scrollToBottom();
  }

  addSupplementCard(supp) {
    const card = document.createElement('div');
    card.className = 'chat-product-card';
    card.innerHTML = `
      <div class="chat-product-header">
        <span class="chat-product-name">${supp.name}</span>
        <span class="chat-product-price" style="color: var(--gold);">Rx-grade</span>
      </div>
      <div class="chat-product-desc">${supp.desc}</div>
      <a href="${DISPENSARY_URL}" target="_blank" rel="noopener noreferrer" class="chat-product-cta">
        View in Dispensary \u2192
      </a>
    `;
    this.messages.appendChild(card);
    this.scrollToBottom();
  }

  addDisclaimer(text) {
    const el = document.createElement('div');
    el.className = 'chat-disclaimer';
    el.textContent = text;
    this.messages.appendChild(el);
    this.scrollToBottom();
  }

  addTypingIndicator() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `
      <div class="msg-avatar">A</div>
      <div class="msg-bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    this.messages.appendChild(row);
    return row;
  }

  disableQuickReplies(container) {
    container.querySelectorAll('button').forEach(btn => {
      btn.disabled = true;
      btn.style.opacity = '0.45';
      btn.style.pointerEvents = 'none';
    });
  }

  scrollToBottom() {
    requestAnimationFrame(() => {
      this.messages.scrollTop = this.messages.scrollHeight;
    });
  }

  formatText(text) {
    return text.replace(/\n/g, '<br>');
  }

  escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  enableInput(placeholder) {
    this.input.disabled = false;
    this.sendBtn.disabled = false;
    this.input.placeholder = placeholder || 'Type a message...';
    this.input.focus();
  }

  disableInput() {
    this.input.disabled = true;
    this.sendBtn.disabled = true;
    this.input.placeholder = 'Select an option above...';
    this.input.value = '';
  }

  // ===== CONVERSATION FLOWS =====

      { label: 'Browse our skincare shop', url: SHOP_URL, cta: true },
      { label: 'Request a Consultation \u2192', url: CONTACT_URL, cta: true },
      { label: 'Visit supplement dispensary', url: DISPENSARY_URL },
      { label: '\u2190 Start over', action: () => this.flowRestart() }
    ]);
  }

  // ===========================================================
  // TEXT INPUT HANDLER
  // ===========================================================

  handleTextInput() {
    const text = this.input.value.trim();
    if (!text) return;

    this.addUserMessage(text);
    this.input.value = '';

    if (this.inputMode === 'name') {
      this.userName = text;
      this.disableInput();
      this.flowLeadEmail();
    } else if (this.inputMode === 'email') {
      this.userEmail = text;
      this.disableInput();
      this.flowLeadComplete();
    } else {
      // Free text — guide them back
      this.disableInput();
      this.handleFreeText(text);
    }
  }

  async handleFreeText(text) {
    const lower = text.toLowerCase();

    // Pregnancy / nursing detection
    if (lower.includes('pregnant') || lower.includes('nursing') || lower.includes('pregnancy')) {
      await this.addBotMessage("That's important to share. Let me guide you to products that are safe during pregnancy.");
      this.flowContra_Pregnant('dryness');
    }
    // Treatment keywords
    else if (lower.includes('treatment') || lower.includes('botox') || lower.includes('filler') || lower.includes('peel') || lower.includes('microneedling') || lower.includes('contour')) {
      await this.addBotMessage("Let me tell you about our treatment options.");
      this.flowPath4_TreatmentGuidance();
    }
    // Routine keywords
    else if (lower.includes('routine') || lower.includes('morning') || lower.includes('night') || lower.includes('regimen')) {
      await this.addBotMessage("Let's work on your routine together.");
      this.flowPath2_RoutineBuilder();
    }
    // Skin/skincare keywords
    else if (lower.includes('skin') || lower.includes('skincare') || lower.includes('acne') || lower.includes('wrinkle') || lower.includes('aging') || lower.includes('breakout') || lower.includes('pimple')) {
      await this.addBotMessage("Let me help with that \u2014 let's start by understanding your skin.");
      this.flowPath1_ConcernSelect();
    }
    // Specific concern routing
    else if (lower.includes('dark spot') || lower.includes('discoloration') || lower.includes('hyperpig') || lower.includes('bright') || lower.includes('melasma') || lower.includes('pigment')) {
      await this.addBotMessage("Let me help with that \u2014 let's start by understanding your skin.");
      this.flowPath1_Contraindication('discoloration');
    }
    else if (lower.includes('red') || lower.includes('sensitive') || lower.includes('rosacea') || lower.includes('irritat')) {
      await this.addBotMessage("Let me help with that \u2014 let's start by understanding your skin.");
      this.flowPath1_Contraindication('redness');
    }
    else if (lower.includes('dry') || lower.includes('hydrat') || lower.includes('moisture')) {
      await this.addBotMessage("Let me help with that \u2014 let's start by understanding your skin.");
      this.flowPath1_Contraindication('dryness');
    }
    else if (lower.includes('neck') || lower.includes('decollete') || lower.includes('d\u00e9collet\u00e9') || lower.includes('chest')) {
      await this.addBotMessage("Let me help with that \u2014 let's start by understanding your skin.");
      this.flowPath1_Contraindication('neck');
    }
    else if (lower.includes('pore') || lower.includes('texture') || lower.includes('rough') || lower.includes('smooth')) {
      await this.addBotMessage("Let me help with that \u2014 let's start by understanding your skin.");
      this.flowPath1_Contraindication('texture');
    }
    // HealthPass / body scan keywords
    else if (lower.includes('body scan') || lower.includes('healthpass') || lower.includes('health pass') || lower.includes('body composition') || lower.includes('styku') || lower.includes('3d scan') || lower.includes('body fat') || lower.includes('disease risk')) {
      await this.addBotMessage("Great question — let me tell you about our HealthPass 3D body scan.");
      this.flowHealthPass();
    }
    // Supplement/wellness keywords
    else if (lower.includes('supplement') || lower.includes('vitamin') || lower.includes('sleep') || lower.includes('wellness') || lower.includes('energy')) {
      await this.addBotMessage("I can help with wellness and supplements.");
      this.flowPath3_Wellness();
    }
    // Consultation/contact keywords
    else if (lower.includes('consult') || lower.includes('text us') || lower.includes('doctor') || lower.includes('appointment')) {
      this.flowConsultation();
    }
    // Muscle/workout
    else if (lower.includes('muscle') || lower.includes('creatine') || lower.includes('protein') || lower.includes('workout')) {
      await this.addBotMessage("I can help with wellness and supplements.");
      this.flowPath3_BundleRec('muscle');
    }
    // Weight
    else if (lower.includes('weight') || lower.includes('metabolism') || lower.includes('fat')) {
      await this.addBotMessage("I can help with wellness and supplements.");
      this.flowPath3_BundleRec('weight');
    }
    // Longevity
    else if (lower.includes('longevity') || lower.includes('nad') || lower.includes('nmn')) {
      await this.addBotMessage("I can help with wellness and supplements.");
      this.flowPath3_BundleRec('longevity');
    }
    // Default fallback
    else {
      await this.addBotMessage("I appreciate your message! To help you best, could you select one of the options below?");
      this.addQuickReplies([
        { label: 'I want to improve my skin', action: () => this.flowPath1_ConcernSelect() },
        { label: 'Help me build a routine', action: () => this.flowPath2_RoutineBuilder() },
        { label: 'Wellness & supplements', action: () => this.flowPath3_Wellness() },
        { label: "I'm considering a treatment", action: () => this.flowPath4_TreatmentGuidance() },
        { label: 'I have a question', action: () => this.flowFAQ() }
      ]);
    }
  }

  // ===========================================================
  // RESTART
  // ===========================================================

  async flowRestart() {
    await this.addBotMessage("Of course! What else can I help you with?");
    this.addQuickReplies([
      { label: 'I want to improve my skin', action: () => this.flowPath1_ConcernSelect() },
      { label: 'Help me build or refine my routine', action: () => this.flowPath2_RoutineBuilder() },
      { label: 'Wellness & supplements', action: () => this.flowPath3_Wellness() },
      { label: "I'm considering a treatment", action: () => this.flowPath4_TreatmentGuidance() },
      { label: 'I have a question', action: () => this.flowFAQ() }
    ]);
    this.disableInput();
  }

  // Utility
  delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }
}

// Standalone mode — auto-open immediately
document.addEventListener('DOMContentLoaded', () => {
  const bot = new ArtemisChatbot();
  // Force open without needing the toggle click
  bot.window.classList.add('open');
  if (bot.state === 'idle') {
    bot.state = 'welcome';
    setTimeout(() => bot.showWelcome(), 300);
  }
});
</script>
