<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="0" fill="#1B2A4A"/>
  <!-- Crescent moon matching Artemis logo - golden gradient -->
  <defs>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A943"/>
      <stop offset="50%" style="stop-color:#C4A265"/>
      <stop offset="100%" style="stop-color:#D4B87A"/>
    </linearGradient>
  </defs>
  <!-- Outer arc of crescent -->
  <path d="M 310 60 
           C 180 60, 80 170, 80 300 
           C 80 410, 170 480, 280 480 
           C 300 480, 330 475, 350 465
           C 260 460, 180 390, 180 290
           C 180 180, 240 100, 340 75
           C 330 65, 320 60, 310 60 Z" 
        fill="url(#moonGrad)"/>
  <!-- Elegant thin tail swoosh at bottom -->
  <path d="M 280 480 C 320 470, 380 430, 420 370" 
        stroke="url(#moonGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
